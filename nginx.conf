# HTTP → HTTPS
server {
    listen 80;
    server_name repondly.com www.repondly.com app.repondly.com admin.repondly.com;
    return 301 https://$host$request_uri;
}

# https://www.repondly.com → https://repondly.com
server {
    listen 443 ssl;
    server_name www.repondly.com;

    ssl_certificate /etc/letsencrypt/live/repondly.com-0001/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/repondly.com-0001/privkey.pem;

    return 301 https://repondly.com$request_uri;
}

# repondly.com → marketing-site :3005
server {
    listen 443 ssl;
    server_name repondly.com;

    ssl_certificate /etc/letsencrypt/live/repondly.com-0001/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/repondly.com-0001/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:3005;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# app.repondly.com → dashboard-app :3004
server {
    listen 443 ssl;
    server_name app.repondly.com;

    ssl_certificate /etc/letsencrypt/live/repondly.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/repondly.com/privkey.pem;

    # Bot
    location /bot/ {
        proxy_pass http://127.0.0.1:3001/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Next.js static assets
    location /_next/ {
        proxy_pass http://127.0.0.1:3004;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check
    location /health {
        proxy_pass http://127.0.0.1:3004/api/health;
    }

    # dashboard-app :3004
    location / {
        proxy_pass http://127.0.0.1:3004;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# admin.repondly.com → admin :3006
server {
    listen 443 ssl;
    server_name admin.repondly.com;

    ssl_certificate /etc/letsencrypt/live/repondly.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/repondly.com/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:3006;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}

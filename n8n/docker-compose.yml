version: '3.8'

services:
  n8n:
    image: n8nio/n8n:latest
    container_name: repondly-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=n8n.repondly.com
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - WEBHOOK_URL=https://n8n.repondly.com/
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=RepondlyN8nInstance2026
      - GENERIC_TIMEZONE=Africa/Tunis
      - TZ=Africa/Tunis
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  n8n_data:
    driver: local
